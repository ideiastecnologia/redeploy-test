name: CloudPilot Deploy

on:
  push:
    branches: [main]

env:
  ECR_REGISTRY: 926652664564.dkr.ecr.us-east-1.amazonaws.com/redeploy-test
  IMAGE_NAME: redeploy-test

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        run: |
          docker build -t $ECR_REGISTRY/$IMAGE_NAME:${{ github.sha }} .
          docker push $ECR_REGISTRY/$IMAGE_NAME:${{ github.sha }}

      - name: Notify CloudPilot
        run: |
          curl -X POST "${{ secrets.CLOUDPILOT_API_URL }}/api/v1/webhooks/deploy" \
            -H "Authorization: Bearer ${{ secrets.CLOUDPILOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"image": "'$ECR_REGISTRY/$IMAGE_NAME:${{ github.sha }}'", "app": "redeploy-test"}'
